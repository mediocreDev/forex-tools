<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <!-- Professional dark gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1f2937" stroke-width="1">
    <line x1="0" y1="20" x2="64" y2="20"/>
    <line x1="0" y1="36" x2="64" y2="36"/>
    <line x1="0" y1="52" x2="64" y2="52"/>
  </g>

  <!-- 5 Candlesticks -->
  <g stroke-width="2">
    <!-- 1: bullish -->
    <line x1="12" y1="40" x2="12" y2="54" stroke="#9ca3af"/>
    <rect x="10" y="44" width="4" height="8" fill="#10b981"/>

    <!-- 2: strong bullish -->
    <line x1="20" y1="30" x2="20" y2="52" stroke="#9ca3af"/>
    <rect x="18" y="34" width="4" height="14" fill="#10b981"/>

    <!-- 3: pullback (bearish) -->
    <line x1="28" y1="28" x2="28" y2="48" stroke="#9ca3af"/>
    <rect x="26" y="30" width="4" height="10" fill="#ef4444"/>

    <!-- 4: continuation bullish -->
    <line x1="36" y1="20" x2="36" y2="46" stroke="#9ca3af"/>
    <rect x="34" y="26" width="4" height="14" fill="#10b981"/>

    <!-- 5: higher high bullish -->
    <line x1="44" y1="16" x2="44" y2="42" stroke="#9ca3af"/>
    <rect x="42" y="22" width="4" height="12" fill="#10b981"/>
  </g>

  <!-- Dow Theory N-shaped trend (up → pullback → higher high) -->
  <polyline points="8,48 20,34 28,40 40,28 52,22"
            fill="none"
            stroke="#60a5fa"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
