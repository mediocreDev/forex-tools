name: Deploy to VPS
description: Sync compose file, deploy container, verify health

inputs:
  owner_lc:
    required: true
  target_env:
    required: true
  gh_token:
    required: true
    description: "Token for docker login on VPS"
  sha:
    required: true
  vps_host:
    required: true
  vps_user:
    required: true
  vps_ssh_key:
    required: true
  vps_ssh_port:
    required: true
  dev_domain:
    required: true
  prd_domain:
    required: true
  port:
    required: true
    description: "Host port the container is mapped to"
  twelve_data_api_key:
    required: true
    description: "Twelve Data API key for price fetching"
  display_tag:
    required: false
    default: ""
    description: "Human-readable tag shown in logs (e.g. 'v1.2.3'). Cosmetic only — pull is always by SHA."

runs:
  using: "composite"
  steps:
    # ── Encode compose file for inline transfer ───────────────
    - name: 📦 Encode compose file
      id: compose
      shell: bash
      run: |
        echo "base=$(base64 -w0 docker-compose.yml)" >> "$GITHUB_OUTPUT"

    # ── Sync compose file + write .env + pull image + compose up + health checks ──
    - name: 🚀 Deploy & verify
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.vps_host }}
        username: ${{ inputs.vps_user }}
        key: ${{ inputs.vps_ssh_key }}
        port: ${{ inputs.vps_ssh_port }}
        command_timeout: 10m
        script: |
          set -euo pipefail
          DIR="/opt/projects/forextools-${{ inputs.target_env }}"
          cd "$DIR"

          # ── Sync compose file (inline via base64) ────────────
          echo "${{ steps.compose.outputs.base }}" | base64 -d > docker-compose.yml
          echo "✅ Compose file synced"

          # ── Write runtime env file ────────────────────────────
          IMAGE_TAG="ghcr.io/${{ inputs.owner_lc }}/forextools-${{ inputs.target_env }}:${{ inputs.sha }}"
          {
            printf 'IMAGE_TAG=%s\n'             "$IMAGE_TAG"
            printf 'CONTAINER_NAME=%s\n'        "forextools_${{ inputs.target_env }}"
            printf 'PORT=%s\n'                  "${{ inputs.port }}"
            printf 'TWELVE_DATA_API_KEY=%s\n'   "${{ inputs.twelve_data_api_key }}"
          } > .env
          echo "✅ Env file written"

          # ── Docker login & pull ──────────────────────────────
          echo "${{ inputs.gh_token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          if [ -n "${{ inputs.display_tag }}" ]; then
            echo "🏷 Release: ${{ inputs.display_tag }}"
          fi

          echo "📦 Pulling $IMAGE_TAG"
          docker pull "$IMAGE_TAG"

          # ── Compose up ───────────────────────────────────────
          docker compose up -d --force-recreate --remove-orphans

          # ── Resolve domain ───────────────────────────────────
          PORT="${{ inputs.port }}"
          if [ "${{ inputs.target_env }}" = "dev" ]; then
            DOMAIN="${{ inputs.dev_domain }}"
          else
            DOMAIN="${{ inputs.prd_domain }}"
          fi

          # ── Health check helper ──────────────────────────────
          check() {
            local label="$1" url="$2"
            for i in $(seq 1 10); do
              if curl -sf --max-time 5 "$url" >/dev/null 2>&1; then
                echo "✅ $label"
                return 0
              fi
              echo "⏳ $label — attempt $i/10"
              sleep 6
            done
            echo "❌ $label — FAILED"
            docker compose ps || true
            docker compose logs --tail=80 || true
            return 1
          }

          check "HTTP  localhost:${PORT}/health" "http://localhost:${PORT}/health"

          # Caddy/HTTPS checks skipped for prd — DNS + TLS provisioning may not be
          # instant; the HTTP health above confirms the app is running.
          if [ "${{ inputs.target_env }}" != "master" ]; then
            check "HTTPS ${DOMAIN}/"       "https://${DOMAIN}/"
            check "HTTPS ${DOMAIN}/health" "https://${DOMAIN}/health"
          fi
