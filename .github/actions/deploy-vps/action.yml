name: Deploy to VPS
description: Sync compose files, deploy container, verify health

inputs:
  owner_lc:
    required: true
  target_env:
    required: true
  gh_token:
    required: true
    description: "Token for docker login on VPS"
  sha:
    required: true
  vps_host:
    required: true
  vps_user:
    required: true
  vps_ssh_key:
    required: true
  vps_ssh_port:
    required: true
  dev_domain:
    required: true
  prd_domain:
    required: true
  port:
    required: true
    description: "Host port the container is mapped to"

runs:
  using: "composite"
  steps:
    # ── Encode compose files for inline transfer ─────────────
    - name: 📦 Encode compose files
      id: compose
      shell: bash
      run: |
        echo "base=$(base64 -w0 docker-compose.yml)" >> "$GITHUB_OUTPUT"
        echo "env=$(base64 -w0 docker-compose.${{ inputs.target_env }}.yml)" >> "$GITHUB_OUTPUT"

    # ── Sync compose files + pull image + compose up + health checks ──
    - name: 🚀 Deploy & verify
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.vps_host }}
        username: ${{ inputs.vps_user }}
        key: ${{ inputs.vps_ssh_key }}
        port: ${{ inputs.vps_ssh_port }}
        command_timeout: 10m
        script: |
          set -euo pipefail
          DIR="/opt/projects/forextools-${{ inputs.target_env }}"
          cd "$DIR"

          # ── Sync compose files (inline via base64) ───────────
          echo "${{ steps.compose.outputs.base }}" | base64 -d > docker-compose.yml
          echo "${{ steps.compose.outputs.env }}"  | base64 -d > docker-compose.${{ inputs.target_env }}.yml
          echo "✅ Compose files synced"

          # ── Docker login & pull ──────────────────────────────
          echo "${{ inputs.gh_token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          IMAGE_TAG="ghcr.io/${{ inputs.owner_lc }}/forextools-${{ inputs.target_env }}:${{ inputs.sha }}"
          echo "📦 Pulling $IMAGE_TAG"
          docker pull "$IMAGE_TAG"

          # ── Compose up ───────────────────────────────────────
          export IMAGE_TAG
          docker compose -f docker-compose.yml -f "docker-compose.${{ inputs.target_env }}.yml" \
            up -d --force-recreate --remove-orphans

          # ── Resolve domain ───────────────────────────────────
          PORT="${{ inputs.port }}"
          if [ "${{ inputs.target_env }}" = "dev" ]; then
            DOMAIN="${{ inputs.dev_domain }}"
          else
            DOMAIN="${{ inputs.prd_domain }}"
          fi

          # ── Health check helper ──────────────────────────────
          check() {
            local label="$1" url="$2"
            for i in $(seq 1 10); do
              if curl -sf --max-time 5 "$url" >/dev/null 2>&1; then
                echo "✅ $label"
                return 0
              fi
              echo "⏳ $label — attempt $i/10"
              sleep 6
            done
            echo "❌ $label — FAILED"
            docker compose ps || true
            docker compose logs --tail=80 || true
            return 1
          }

          check "HTTP  localhost:${PORT}/health" "http://localhost:${PORT}/health"
          check "HTTPS ${DOMAIN}/"               "https://${DOMAIN}/"
          check "HTTPS ${DOMAIN}/health"         "https://${DOMAIN}/health"
