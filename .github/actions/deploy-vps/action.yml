name: Deploy to VPS
description: Upload compose files, deploy container, verify health

inputs:
  owner_lc:
    required: true
  target_env:
    required: true
  gh_token:
    required: true
    description: "Token for docker login on VPS"
  sha:
    required: true
  vps_host:
    required: true
  vps_user:
    required: true
  vps_ssh_key:
    required: true
  vps_ssh_port:
    required: true
  dev_domain:
    required: true
  prd_domain:
    required: true
  port:
    required: true
    description: "Host port the container is mapped to"

runs:
  using: "composite"
  steps:
    # ── Upload docker-compose files ──────────────────────────
    - name: 📥 Rsync compose files to VPS
      shell: bash
      run: |
        set -euo pipefail

        KEY="$(mktemp)"
        trap 'rm -f "$KEY"' EXIT
        printf "%s" "${{ inputs.vps_ssh_key }}" > "$KEY"
        chmod 600 "$KEY"

        RSYNC_SSH="ssh -p ${{ inputs.vps_ssh_port }} -i '$KEY' -o StrictHostKeyChecking=accept-new"
        TARGET="${{ inputs.vps_user }}@${{ inputs.vps_host }}"
        DIR="/opt/projects/forextools-${{ inputs.target_env }}"

        rsync -avz -e "$RSYNC_SSH" \
          ./docker-compose.yml \
          "./docker-compose.${{ inputs.target_env }}.yml" \
          "$TARGET:${DIR}/"

    # ── Pull image, compose up, health checks ────────────────
    - name: 🚀 Deploy & verify
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.vps_host }}
        username: ${{ inputs.vps_user }}
        key: ${{ inputs.vps_ssh_key }}
        port: ${{ inputs.vps_ssh_port }}
        command_timeout: 10m
        script: |
          set -euo pipefail
          cd "/opt/projects/forextools-${{ inputs.target_env }}"

          # ── Docker login & pull ──────────────────────────────
          echo "${{ inputs.gh_token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          IMAGE_TAG="ghcr.io/${{ inputs.owner_lc }}/forextools-${{ inputs.target_env }}:${{ inputs.sha }}"
          echo "📦 Pulling $IMAGE_TAG"
          docker pull "$IMAGE_TAG"

          # ── Compose up ───────────────────────────────────────
          export IMAGE_TAG
          docker compose -f docker-compose.yml -f "docker-compose.${{ inputs.target_env }}.yml" \
            up -d --force-recreate --remove-orphans

          # ── Resolve domain ───────────────────────────────────
          PORT="${{ inputs.port }}"
          if [ "${{ inputs.target_env }}" = "dev" ]; then
            DOMAIN="${{ inputs.dev_domain }}"
          else
            DOMAIN="${{ inputs.prd_domain }}"
          fi

          # ── Health check helper ──────────────────────────────
          check() {
            local label="$1" url="$2"
            for i in $(seq 1 10); do
              if curl -sf --max-time 5 "$url" >/dev/null 2>&1; then
                echo "✅ $label"
                return 0
              fi
              echo "⏳ $label — attempt $i/10"
              sleep 6
            done
            echo "❌ $label — FAILED"
            docker compose ps || true
            docker compose logs --tail=80 || true
            return 1
          }

          check "HTTP  localhost:${PORT}/health" "http://localhost:${PORT}/health"
          check "HTTPS ${DOMAIN}/"               "https://${DOMAIN}/"
          check "HTTPS ${DOMAIN}/health"         "https://${DOMAIN}/health"
