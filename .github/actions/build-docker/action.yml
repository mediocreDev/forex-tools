name: Build Docker Image
description: Multi-stage build (Vue SPA + proxy) and push to GHCR

inputs:
  owner_lc:
    required: true
    description: "Repository owner (lowercase)"
  target_env:
    required: true
    description: "Target environment (dev or master)"
  extra_tag:
    required: true
    description: "Additional tag: 'pr-N' for preview or 'latest' for release"
  sha:
    required: true
    description: "Commit SHA"
  github_token:
    required: true
    description: "GitHub token for GHCR"

outputs:
  image_tag:
    description: "SHA-tagged image that was pushed"
    value: ${{ steps.build.outputs.image_tag }}

runs:
  using: "composite"
  steps:
    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: 📦 Build & push
      id: build
      shell: bash
      run: |
        set -euo pipefail

        IMAGE="ghcr.io/${{ inputs.owner_lc }}/forextools-${{ inputs.target_env }}"
        SHA="${{ inputs.sha }}"
        EXTRA="${{ inputs.extra_tag }}"

        # dev env uses Vite's --mode dev
        BUILD_MODE="production"
        [[ "${{ inputs.target_env }}" == "dev" ]] && BUILD_MODE="dev"

        echo "🏗 Building $IMAGE:$SHA (+$EXTRA) [mode=$BUILD_MODE]"

        docker buildx build \
          --build-arg BUILD_MODE="$BUILD_MODE" \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          --push \
          -t "$IMAGE:$SHA" \
          -t "$IMAGE:$EXTRA" \
          .

        echo "image_tag=$IMAGE:$SHA" >> "$GITHUB_OUTPUT"
