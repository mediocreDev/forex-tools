name: Build Docker Image
description: Multi-stage build (Vue SPA + proxy) and push to GHCR

inputs:
  owner_lc:
    required: true
    description: "Repository owner (lowercase)"
  target_env:
    required: true
    description: "Target environment (dev or master)"
  extra_tag:
    required: false
    default: ""
    description: "Secondary tag (e.g. 'pr-N' or 'latest'). Empty to skip."
  semver_tag:
    required: false
    default: ""
    description: "Semver release tag (e.g. 'v1.2.3'). Empty to skip. Used by master tag-push releases."
  sha:
    required: true
    description: "Commit SHA"
  github_token:
    required: true
    description: "GitHub token for GHCR"

outputs:
  image_tag:
    description: "SHA-tagged image that was pushed"
    value: ${{ steps.build.outputs.image_tag }}

runs:
  using: "composite"
  steps:
    - uses: docker/setup-buildx-action@v4

    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: 📦 Build & push
      id: build
      shell: bash
      run: |
        set -euo pipefail

        IMAGE="ghcr.io/${{ inputs.owner_lc }}/forextools-${{ inputs.target_env }}"
        SHA="${{ inputs.sha }}"
        EXTRA="${{ inputs.extra_tag }}"
        SEMVER="${{ inputs.semver_tag }}"

        TAG_ARGS=( -t "$IMAGE:$SHA" )
        [[ -n "$EXTRA"  ]] && TAG_ARGS+=( -t "$IMAGE:$EXTRA" )
        [[ -n "$SEMVER" ]] && TAG_ARGS+=( -t "$IMAGE:$SEMVER" )

        # ── Compute display version baked into the frontend ───
        SHA_SHORT=$(echo "$SHA" | cut -c1-7)
        if [[ -n "$SEMVER" ]]; then
          BUILD_VERSION="$SEMVER"
        else
          BUILD_VERSION="${{ inputs.target_env }}-${SHA_SHORT}"
        fi
        echo "🏷 BUILD_VERSION=$BUILD_VERSION"

        echo "🏗 Building $IMAGE with tags: ${TAG_ARGS[*]}"

        docker buildx build \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          --build-arg BUILD_VERSION="$BUILD_VERSION" \
          --push \
          "${TAG_ARGS[@]}" \
          .

        echo "image_tag=$IMAGE:$SHA" >> "$GITHUB_OUTPUT"
