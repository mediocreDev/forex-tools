services:
  app:
    image: ${IMAGE_TAG}
    container_name: ${CONTAINER_NAME}
    restart: always
    environment:
      PORT: 5000
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY}
    ports:
      - "${PORT}:5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
